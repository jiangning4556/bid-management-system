# 前端 Nginx 配置示例
# 文件位置: /etc/nginx/sites-available/bid-management-frontend

server {
    listen 80;
    server_name www.your-domain.com your-domain.com;

    # 强制 HTTPS
    return 301 https://www.$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.your-domain.com;

    # SSL 证书配置（使用 Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/www.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.your-domain.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态文件根目录
    root /var/www/bid-management/frontend;
    index index.html;

    # 日志
    access_log /var/log/nginx/bid-management-frontend-access.log;
    error_log /var/log/nginx/bid-management-frontend-error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vue Router history 模式配置
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理（可选：如果前后端在同一域名下）
    # location /api/ {
    #     proxy_pass http://localhost:3000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
